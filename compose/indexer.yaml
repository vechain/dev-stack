services:
  mongo-node1:
    image: mongo:8
    container_name: mongo-node1
    hostname: mongo-node1
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    tmpfs:
      - /data/db
      - /data/configdb
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok } catch(e) { 0 }
        " | grep -q 1
      interval: 5s
      retries: 30
    networks:
      - vechain-thor

  mongo-setup:
    image: mongo:8
    container_name: mongo-setup
    depends_on:
      mongo-node1:
        condition: service_started
    entrypoint:
      - bash
      - -c
      - |
        sleep 3
        mongosh --host mongo-node1:27017 --quiet --eval '
          rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo-node1:27017" }] });
        ' || true
        sleep 2
        mongosh --host mongo-node1:27017 --quiet --eval '
          while (!rs.isMaster().ismaster) { sleep(1000); }
          print("mongo-setup done");
        '
    restart: "no"
    networks:
      - vechain-thor

  vechain-indexer:
    image: ${VECHAIN_DEV_INDEXER_IMAGE:-ghcr.io/vechain/vechain-indexer/indexer:6.31.3}
    container_name: vechain-indexer
    depends_on:
      mongo-setup:
        condition: service_completed_successfully
    volumes:
      - ${VECHAIN_DEV_GENESIS:?VECHAIN_DEV_GENESIS not set}:/usr/app/genesis-solo.json:ro
    env_file:
      - ${VECHAIN_DEV_HOME:?VECHAIN_DEV_HOME not set}/generated/indexer.env
    environment:
      MONGO_URI: "mongodb://mongo-node1:27017/vechain-indexer?replicaSet=rs0"
      THOR_URL: "http://thor-solo:8669"
      INDEXER_GENESIS_VET_BALANCES_RESOURCE: "file:/usr/app/genesis-solo.json"
      INDEXER_CATCH_UP_INTERVAL_SECONDS: "15"
    networks:
      - vechain-thor

  vechain-indexer-api:
    image: ${VECHAIN_DEV_INDEXER_API_IMAGE:-ghcr.io/vechain/vechain-indexer/api:6.31.3}
    container_name: vechain-indexer-api
    depends_on:
      mongo-setup:
        condition: service_completed_successfully
    env_file:
      - ${VECHAIN_DEV_HOME:?VECHAIN_DEV_HOME not set}/generated/indexer-api.env
    environment:
      MONGO_URI: "mongodb://mongo-node1:27017/vechain-indexer?replicaSet=rs0"
      THOR_URL: "http://thor-solo:8669"
    ports:
      - "8089:8080"
    networks:
      - vechain-thor

networks:
  vechain-thor:
    external: true
