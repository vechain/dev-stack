services:
  thor-solo:
    image: ${VECHAIN_DEV_THOR_IMAGE:-ghcr.io/vechain/thor:latest}
    container_name: thor-solo
    hostname: thor-solo
    command:
      - solo
      - --on-demand
      - --persist
      - --api-addr=0.0.0.0:8669
      - --api-cors=${VECHAIN_DEV_THOR_API_CORS:-*}
      - --gas-limit=${VECHAIN_DEV_THOR_GAS_LIMIT:-40000000}
      - --txpool-limit=${VECHAIN_DEV_THOR_TXPOOL_LIMIT:-10000}
      - --txpool-limit-per-account=${VECHAIN_DEV_THOR_TXPOOL_LIMIT_PER_ACCOUNT:-256}
    ports:
      - "8669:8669"
    volumes:
      - thor-data:/home/thor
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:8669/blocks/best || exit 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - vechain-thor

networks:
  vechain-thor:
    external: true

volumes:
  thor-data:
    name: vechain-dev-thor-data
