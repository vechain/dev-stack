services:
  block-explorer:
    image: ${VECHAIN_DEV_EXPLORER_IMAGE:-ghcr.io/vechain/block-explorer:2.41.0}
    container_name: block-explorer
    hostname: block-explorer
    env_file:
      - ${VECHAIN_DEV_HOME:?VECHAIN_DEV_HOME not set}/generated/explorer.env
    environment:
      ALLOW_DEV_MODE: "true"
      B32_URL: "https://b32.vecha.in"
    ports:
      - "8088:3000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - vechain-thor

networks:
  vechain-thor:
    external: true
