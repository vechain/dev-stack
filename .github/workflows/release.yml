name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump'
        required: true
        type: choice
        default: prerelease
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      preid:
        description: 'Prerelease identifier (used with pre* types, e.g. alpha, beta, rc)'
        required: false
        default: alpha
      dry_run:
        description: 'Dry run (skip git push and npm publish)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [[ "${{ inputs.release_type }}" == pre* ]]; then
            npm version "${{ inputs.release_type }}" --preid="${{ inputs.preid }}" -m "chore(release): %s"
          else
            npm version "${{ inputs.release_type }}" -m "chore(release): %s"
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push commit and tag
        if: ${{ !inputs.dry_run }}
        run: git push --follow-tags origin HEAD:${{ github.ref_name }}

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --tag "${{ steps.bump.outputs.dist_tag }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.bump.outputs.prerelease == 'true' }}

      - name: Summary
        run: |
          {
            echo "### Release ${{ steps.bump.outputs.tag }}"
            echo ""
            echo "- Version: \`${{ steps.bump.outputs.version }}\`"
            echo "- npm dist-tag: \`${{ steps.bump.outputs.dist_tag }}\`"
            echo "- Dry run: \`${{ inputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
